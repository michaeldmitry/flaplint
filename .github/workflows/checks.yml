name: checks

# The single definition of "the checks" -- lint, static typing, tests. Both the PR
# gate (ci.yml) and the release pipeline (release.yml) `uses:` this, so there is exactly
# one copy of the check matrix in the repo, and every step is a `just` recipe that runs
# identically on a laptop (`just check`). This is a *reusable* workflow: it does nothing
# on its own, only when another workflow calls it.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just lint

  static:
    name: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just static

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # flaplint parses charm source with the *running* interpreter's `ast`, so its
        # own Python version is load-bearing (AST shapes differ across releases).
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: extractions/setup-just@v4
      - run: just test

  ci-ok:
    # A single, stable check to put in branch protection. Without it you would have to
    # re-pin every matrix leg by name in the repo settings each time the matrix changes.
    name: ci-ok
    if: always()
    needs: [lint, static, test]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "all required checks passed"
