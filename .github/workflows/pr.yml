name: CI

# The PR gate. Runs the shared checks (lint / static / test -- defined once in
# checks.yml) plus a Conventional-Commits check on the PR title. The identical checks
# run again on `main` inside release.yml, so there is no separate "merge" workflow.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  pr-title:
    # Enforce Conventional Commits on the PR *title*, not the commits: with squash-merge
    # (the setting this repo should use) the title becomes the single commit on `main`,
    # and that is exactly what release-please reads to pick the next version. So the title
    # IS the contract; WIP commit messages inside the branch stay free-form.
    name: pr title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types that drive the release (see release.yml):
          #   fix: -> patch      feat: -> minor      feat!/BREAKING CHANGE -> major
          # The rest are no-release housekeeping types.
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
          requireScope: false
          # Subject should read like a sentence fragment: lowercase, no trailing period.
          subjectPattern: ^(?![A-Z])(?!.*\.$).+$
          subjectPatternError: |
            The subject "{subject}" is invalid for the "{type}" type: it must start
            lowercase and must not end with a period.
