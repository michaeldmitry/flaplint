name: PR title

# Enforce Conventional Commits on the PR *title*.
#
# Why the title and not the commits: with squash-merge (the setting this repo should
# use), the PR title becomes the single commit message on `main` -- and that is exactly
# what release-please reads to decide the next version. So the title IS the contract.
# Individual WIP commit messages inside the branch are then free-form, which is humane.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conventional:
    name: conventional commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types that drive the release (see release.yml):
          #   fix:  -> patch      feat: -> minor      feat!/BREAKING CHANGE -> major
          # The rest are no-release housekeeping types.
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
          requireScope: false
          # Subject should read like a sentence fragment: lowercase, no trailing period.
          subjectPattern: ^(?![A-Z])(?!.*\.$).+$
          subjectPatternError: |
            The subject "{subject}" is invalid for the "{type}" type: it must start
            lowercase and must not end with a period.
